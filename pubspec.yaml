  go_router: ^14.8.1
  timeago: ^3.7.0
  flutter_branch_sdk: ^8.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Generators:
  build_runner: ^2.3.3
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1 # Package to regenerate icons (config later in this file). To run, type `dart run flutter_launcher_icons`
  drift_dev: ^2.13.2
  slang_build_runner: ^3.18.0 # To regenerate the translations run 'dart run slang'
  copy_with_extension_gen: ^5.0.4
  freezed: ^2.4.5

build:
  ios:

    build-name: 2.0.15
    build-number: 88
  android:
    build-name: 2.0.15
    build-number: 88



flutter_launcher_icons:
  image_path: 'assets/resources/appIcon.png'
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/resources/
    - assets/icons/onboarding/
    - assets/icons/avatars/
    - assets/icons/currency_flags/
    - assets/icons/page_states/
    - assets/icons/supported_selectable_icons/entertainment/
    - assets/icons/supported_selectable_icons/other/
    - assets/icons/supported_selectable_icons/money/
    - assets/icons/supported_selectable_icons/food/
    - assets/icons/supported_selectable_icons/medical/
    - assets/icons/supported_selectable_icons/transport/
    - assets/icons/supported_selectable_icons/technology/
    - assets/icons/supported_selectable_icons/logos/open/
    - assets/icons/supported_selectable_icons/logos/open/marca_positiva_open_finance.svg
    - assets/icons/supported_selectable_icons/logos/open/marca_open_finance.svg
    - assets/icons/supported_selectable_icons/logos/open/logo.png
    - assets/icons/supported_selectable_icons/logos/financial_institutions/
    - assets/icons/supported_selectable_icons/logos/financial_institutions/611.svg
    - assets/institutions/
    - assets/png_icons/
    - assets/sql/
    - assets/sql/migrations/
    - .env
    - lib/app/onboarding/questions.json

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito/Nunito-Italic.ttf
          style: italic
        - asset: assets/fonts/Nunito/Nunito-Black.ttf
