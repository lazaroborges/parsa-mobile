  webview_flutter: ^4.10.0

  # General
  cupertino_icons: ^1.0.0
  collection: ^1.18.0
  equatable: ^2.0.5
  path: ^1.8.2
  async: ^2.10.0
  rxdart: ^0.28.0

  # i18n
  intl: ^0.19.0
  slang: ^3.30.1
